name: CI-CD Docker Pipeline

on:
  push:
    branches:
      - main
      - trivy

env:
  IMAGE_NAME: ci-html
  IMAGE_TAG: 1.0.1
  DOCKER_REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  ci:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Display variables
        shell: powershell
        run: |
          Write-Host "IMAGE_NAME: $env:IMAGE_NAME"
          Write-Host "IMAGE_TAG: $env:IMAGE_TAG"
          Write-Host "DOCKER_REGISTRY: $env:DOCKER_REGISTRY"

      - name: Login to Docker Hub
        shell: powershell
        run: |
          "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        shell: powershell
        run: |
          docker build -t ${env:DOCKER_REGISTRY}/${env:IMAGE_NAME}:${env:IMAGE_TAG} .

      - name: Verify image
        shell: powershell
        run: |
          docker images

      - name: Push Docker image
        shell: powershell
        run: |
          docker push ${env:DOCKER_REGISTRY}/${env:IMAGE_NAME}:${env:IMAGE_TAG}

  scan-trivy:
    needs: ci
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
          vuln-type: os,library
          ignore-unfixed: true

      - name: Scan filesystem with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

  deploy:
    needs: scan-trivy
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Login to Docker Hub
        shell: powershell
        run: |
          "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull latest image
        shell: powershell
        run: |
          docker pull ${env:DOCKER_REGISTRY}/${env:IMAGE_NAME}:${env:IMAGE_TAG}

      - name: Stop existing container if exists
        shell: powershell
        run: |
          $container = docker ps -a --format "{{.Names}}" | Select-String "^ci-app$"
          if ($container) {
            docker stop ci-app
          } else {
            Write-Host "Container ci-app not found, skipping stop."
          }

      - name: Remove old container if exists
        shell: powershell
        run: |
          $container = docker ps -a --format "{{.Names}}" | Select-String "^ci-app$"
          if ($container) {
            docker rm ci-app
          } else {
            Write-Host "Container ci-app not found, skipping remove."
          }

      - name: Run new container
        shell: powershell
        run: |
          docker run -d `
            -p 80:80 `
            --name ci-app `
            ${env:DOCKER_REGISTRY}/${env:IMAGE_NAME}:${env:IMAGE_TAG}
